<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>啟動 Design Prototype Sync Bridge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #f5f6f8; color: #1a1a1a; padding: 24px;
  }
  .card {
    background: #fff; border-radius: 14px; padding: 36px 32px; max-width: 440px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08); text-align: center;
  }
  .logo { font-size: 13px; letter-spacing: 2px; color: #2563eb; font-weight: 700; }
  h1 { font-size: 20px; margin: 14px 0 10px; }
  p { font-size: 14px; line-height: 1.65; color: #555; }
  .btn {
    display: inline-block; margin-top: 22px; padding: 11px 28px;
    background: #2563eb; color: #fff; text-decoration: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; transition: background .15s;
  }
  .btn:hover { background: #1d4ed8; }
  .hint { margin-top: 18px; font-size: 12px; color: #999; }
  .spinner {
    width: 18px; height: 18px; border: 2px solid #dbeafe; border-top-color: #2563eb;
    border-radius: 50%; display: inline-block; vertical-align: middle;
    animation: spin .8s linear infinite; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">DESIGN PROTOTYPE SYNC</div>
    <h1><span class="spinner"></span>正在啟動 Bridge…</h1>
    <p>若瀏覽器詢問「是否開啟 DPSyncLauncher？」,請按<strong>允許</strong>。<br/>
       沒有自動跳出時,請點下方按鈕。</p>
    <a class="btn" href="dpsync://start">手動啟動 Bridge</a>
    <p class="hint">啟動成功後即可關閉此分頁,回到 Figma。</p>
  </div>
  <script>
    // 自動喚起自訂 URL scheme(瀏覽器 → macOS → DPSyncLauncher.app → 啟動.command)
    setTimeout(function () { window.location.href = 'dpsync://start'; }, 350);
  </script>
</body>
</html>
