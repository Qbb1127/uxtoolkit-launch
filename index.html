<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>啟動 UX Toolkit Bridge</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #f5f6f8; color: #1a1a1a; padding: 24px;
  }
  .card {
    background: #fff; border-radius: 14px; padding: 36px 32px; max-width: 440px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08); text-align: center;
  }
  .logo { font-size: 13px; letter-spacing: 2px; color: #0d7de8; font-weight: 700; }
  h1 { font-size: 20px; margin: 14px 0 10px; }
  p { font-size: 14px; line-height: 1.65; color: #555; }
  .btn {
    display: inline-block; margin-top: 22px; padding: 11px 28px;
    background: #0d7de8; color: #fff; text-decoration: none;
    border-radius: 8px; font-size: 15px; font-weight: 600;
    transition: background .15s;
  }
  .btn:hover { background: #0b6ecf; }
  .hint { margin-top: 18px; font-size: 12px; color: #999; }
  .spinner {
    width: 18px; height: 18px; border: 2px solid #d9e8fb; border-top-color: #0d7de8;
    border-radius: 50%; display: inline-block; vertical-align: middle;
    animation: spin .8s linear infinite; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">UX TOOLKIT</div>
    <h1><span class="spinner"></span>正在啟動 Bridge…</h1>
    <p>若瀏覽器詢問「是否開啟 UXToolkitLauncher？」，請按<strong>允許</strong>。<br/>
       沒有自動跳出時，請點下方按鈕。</p>
    <a class="btn" href="uxtoolkit://start">手動啟動 Bridge</a>
    <p class="hint">連線成功後會自動關閉此分頁。</p>
  </div>
  <script>
    // 喚起自訂 URL scheme（瀏覽器 → macOS → UXToolkitLauncher.app → 啟動插件.command）
    var SCHEME = 'uxtoolkit://start';
    var BRIDGE = 'ws://localhost:3334';
    var h1 = document.querySelector('h1');
    var hint = document.querySelector('.hint');
    setTimeout(function () { window.location.href = SCHEME; }, 350);

    // 持續探測本機 bridge，成功連線後自動關閉此分頁。
    var tries = 0, done = false;
    function closeTab() {
      h1.innerHTML = '✓ 已連線 Bridge，正在關閉…';
      try { window.open('', '_self'); window.close(); } catch (e) {}
      setTimeout(function () { hint.textContent = '已連線，可關閉此分頁回到 Figma。'; }, 800);
    }
    function probe() {
      if (done) return;
      var ws;
      try { ws = new WebSocket(BRIDGE); } catch (e) { return retry(); }
      var t = setTimeout(function () { try { ws.close(); } catch (e) {} retry(); }, 1500);
      ws.onopen = function () { done = true; clearTimeout(t); try { ws.close(); } catch (e) {} closeTab(); };
      ws.onerror = function () { clearTimeout(t); try { ws.close(); } catch (e) {} retry(); };
    }
    function retry() { if (!done && tries++ < 90) setTimeout(probe, 700); }
    probe();
  </script>
</body>
</html>
